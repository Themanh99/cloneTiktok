$kind: http-request
name: Refresh Token
description: Get a new access token using a refresh token
url: "{{baseUrl}}/api/auth/refresh"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "<paste_refresh_token_here>"
    }
scripts:
  - type: afterResponse
    code: "// Parse response body sang JSON\r

      var jsonData = pm.response.json();\r

      \r

      // Kiểm tra xem request có thành công không (HTTP 200 hoặc 201)\r

      if (pm.response.code === 200 || pm.response.code === 201) {\r

      \    \r

      \    // Nếu có trả về accessToken thì lưu lại\r

      \    if (jsonData && jsonData.accessToken) {\r

      \        pm.collectionVariables.set(\"accessToken\", jsonData.accessToken);\r

      \        console.log(\"Đã tự động lưu accessToken!\");\r

      \    }\r

      \    \r

      \    // Nếu có trả về refreshToken thì lưu lại\r

      \    if (jsonData && jsonData.refreshToken) {\r

      \        pm.collectionVariables.set(\"refreshToken\", jsonData.refreshToken);\r

      \        console.log(\"Đã tự động lưu refreshToken!\");\r

      \    }\r

      }\r\n"
    language: text/javascript
order: 3000
